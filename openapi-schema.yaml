    get:
      operationId: project_dashboard_summary_retrieve
      description: |-
        Consolidated API endpoint that returns the main project dashboard, asset dashboard,
        intelligence dashboard, and monitoring summary all in one request to eliminate N+1 fetches.

        Calls inner logic functions directly (not the @api_view-wrapped views) to avoid
        the Django HttpRequest vs DRF Request type mismatch that causes a 500 error.
      tags:
      - project
      security:
      - CustomAuthentication: []
      - Bearer:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '200':
          description: No response body
