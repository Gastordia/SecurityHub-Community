openapi: 3.0.3
info:
  title: SecurityHub API Documentation
  version: 1.0.0
  x-logo:
    url: /static/logo.png
    altText: SecurityHub Logo
  description: SecurityHub - Complete API Documentation
paths:
  /api/project/projects/:
    get:
      operationId: project_projects_retrieve
      description: |-
        Get all projects (GET) or create new project (POST).
        GET requires project:view_company capability.
        POST requires project:create capability.
      tags:
      - project
      security:
      - CustomAuthentication: []
      - Bearer:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '200':
          description: No response body
    post:
      operationId: project_projects_create
      description: Create a new project. Requires project:create capability.
      tags:
      - project
      security:
      - CustomAuthentication: []
      - Bearer:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '200':
          description: No response body
    delete:
      operationId: project_projects_destroy
      description: Bulk delete projects
      tags:
      - project
      security:
      - CustomAuthentication: []
      - Bearer:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '204':
          description: No response body
  /api/project/projects/filter/:
    get:
      operationId: project_projects_filter_retrieve
