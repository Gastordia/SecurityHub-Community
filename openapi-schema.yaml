    get:
      operationId: customer_companies_projects_retrieve
      description: |-
        Get company projects. Requires project:view_company or project:view_own capability.

        API endpoint to get all projects for a company within the current organization.
        Returns:
        1. All non-completed projects that don't have active retests
        2. Projects with active retests (is_completed=False)
        3. Project counts by status (hold, in progress, upcoming, delay)
        No pagination - returns all matching projects.

        RBAC Implementation:
        - Validates organization context (required)
        - Verifies company belongs to organization (via organization.company)
        - Filters projects by organization (primary tenant scoping)
        - Optionally filters by company if specified

        Args:
            id: Company ID from URL
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - customer
      security:
      - CustomAuthentication: []
      - Bearer:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '200':
          description: No response body
