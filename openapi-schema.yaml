components:
  schemas:
    ChangePasswordRequest:
      type: object
      description: |-
        Serializer for changing a user's password.

        Fields:
        - oldpassword: The user's current password.
        - newpassword: The new password to be set.

        Validation:
        - Checks if the provided 'oldpassword' matches the user's current password.
        - Validates the 'newpassword' using Django's password validators.

        Update:
        - Updates the user's password with the new one.

        Usage:
        - This serializer is typically used in a view or API endpoint to handle password change requests.
      properties:
        oldpassword:
          type: string
          writeOnly: true
          minLength: 1
        newpassword:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - newpassword
      - oldpassword
    MyTokenObtainPairRequest:
      type: object
      description: |-
        Token serializer for obtaining JWT tokens with additional user information.

        This serializer extends the functionality of TokenObtainPairSerializer to include
        extra user information such as status, username, profile picture URL, isAdmin, isStaff,
        and a list of permissions associated with the user's groups.

        Attributes:
        - Status (str): Indicates the status of the token generation process (True/False).
        - username (str): The username of the authenticated user.
        - Pic (str): The URL of the user's profile picture.
        - isAdmin (bool): Indicates whether the user has superuser privileges.
        - isStaff (bool): Indicates whether the user has staff privileges.
        - permissions (list): A list of permissions associated with the user's groups.

        Note:
        - The associated groups and permissions are fetched based on the user's groups.
      properties:
        email:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    PaginatedVulnDBserializersList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/VulnDBserializers'
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    VulnDBserializers:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        vulnerabilityname:
          type: string
          description: Vulnerability name/title
          maxLength: 300
        vulnerabilityseverity:
          type: string
          description: Basic severity level
          maxLength: 300
        vulnerabilitydescription:
          type: string
          description: Vulnerability description
        vulnerabilitysolution:
          type: string
          description: Recommended solution
        vulnerabilityreferlnk:
          type: string
          nullable: true
          description: Reference links
        cvssscore:
          type: number
          format: double
          nullable: true
          description: Base CVSS score
        cvssvector:
          type: string
          nullable: true
          description: CVSS vector string
          maxLength: 300
        cwe:
          nullable: true
          description: CWE IDs
        is_active:
          type: boolean
          description: Template is active
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Template created date
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Template last updated
      required:
      - vulnerabilitydescription
      - vulnerabilityname
      - vulnerabilityseverity
      - vulnerabilitysolution
    VulnDBserializersRequest:
      type: object
      properties:
        vulnerabilityname:
          type: string
          minLength: 1
          description: Vulnerability name/title
          maxLength: 300
        vulnerabilityseverity:
          type: string
          minLength: 1
          description: Basic severity level
          maxLength: 300
        vulnerabilitydescription:
          type: string
          minLength: 1
          description: Vulnerability description
        vulnerabilitysolution:
          type: string
          minLength: 1
          description: Recommended solution
        vulnerabilityreferlnk:
          type: string
          nullable: true
          description: Reference links
        cvssscore:
          type: number
          format: double
          nullable: true
          description: Base CVSS score
        cvssvector:
          type: string
          nullable: true
          minLength: 1
          description: CVSS vector string
          maxLength: 300
        cwe:
          nullable: true
          description: CWE IDs
        is_active:
          type: boolean
          description: Template is active
      required:
      - vulnerabilitydescription
      - vulnerabilityname
      - vulnerabilityseverity
      - vulnerabilitysolution
  securitySchemes:
    CustomAuthentication:
      type: http
      scheme: bearer
      bearerFormat: JWT
