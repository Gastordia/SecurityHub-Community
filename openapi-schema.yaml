  /api/audit/audit-logs/:
    get:
      operationId: audit_audit_logs_retrieve
      description: |-
        List audit logs with pagination.

        Query Parameters:
        - page: Page number (default: 1)
        - page_size: Items per page (default: 50, max: 500)
        - user_id: Filter by user ID
        - action: Filter by action (supports partial match)
        - actions: Filter by multiple actions (comma-separated)
        - resource_type: Filter by resource type
        - resource_id: Filter by resource ID
        - event_type: Filter by event type (AUDIT, SECURITY_EVENT, DATA_ACCESS)
        - security_event: Filter by security event type
        - compliance_required: Filter compliance-required events (true/false)
        - security_required: Filter security-required events (true/false)
        - ip_address: Filter by IP address
        - date_from: Filter from date (ISO 8601)
