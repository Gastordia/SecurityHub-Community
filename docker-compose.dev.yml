services:

  postgres:
    image: "postgres:16-alpine"
    restart: always
    env_file: ".env"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - securityhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U \"${POSTGRES_USER}\" -d \"${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  securityhub:
    build:
      context: .
      dockerfile: docker/Dockerfile_API.dev
    env_file: ".env"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      WHITELIST_IP: ${WHITELIST_IP}
      ALLOWED_HOST: ${ALLOWED_HOST}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      USE_S3: ${USE_S3}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      USE_EMAIL: ${USE_EMAIL}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL}
      USE_DOCKER: "True"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Live code mounts — :z relabels for SELinux (required on Fedora/RHEL)
      - ./securityhub:/home/securityhub/securityhub/securityhub:z
      - ./scripts:/home/securityhub/securityhub/scripts:z
      # Persistent data volumes (same as production)
      - api_data:/home/securityhub/.securityhub:z
      - static_volume:/home/securityhub/securityhub/securityhub/static/
      - media_volume:/home/securityhub/securityhub/securityhub/media/
    ports:
      - "8000:8000"
    networks:
      - securityhub

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile_frontend.dev
    environment:
      # API calls go from the browser → host:8000, so localhost works here
      - VITE_APP_API_URL=http://localhost:8000
      - VITE_APP_ENV=development
    volumes:
      # Live source mount — :z relabels for SELinux (required on Fedora/RHEL)
      - ./frontend:/app:z
      # Prevent the host mount from hiding the node_modules baked into the image
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - securityhub

networks:
  securityhub:

volumes:
  static_volume:
  media_volume:
  postgres_data:
  api_data:
