# Use Docker's embedded DNS so nginx resolves the upstream lazily at request
# time rather than at startup. Without this, nginx exits with "host not found"
# if the backend container isn't up yet.
resolver 127.0.0.11 valid=10s ipv6=off;

# ── Gzip compression ──────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript
           application/xml+rss application/atom+xml image/svg+xml;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    server_tokens off;
    return 301 https://$host:8443$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;
    client_max_body_size 25M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self';" always;

    ### Host validation — uncomment and edit for production:
    # if ($host !~* ^(yourdomain\.com|www\.yourdomain\.com)$) { return 444; }

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api {
        set $backend http://securityhub:8000;
        proxy_pass         $backend;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Host              $host;
        proxy_redirect     off;
        proxy_read_timeout 120s;
    }

    # ── Static files (Django collectstatic output) ───────────────────────────
    location /static/ {
        alias /home/securityhub/securityhub/securityhub/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files (selective — full /media/ blocked to protect POC evidence)
    location /media/profile/ {
        alias /home/securityhub/securityhub/securityhub/media/profile/;
        expires 7d;
    }

    location /media/company/ {
        alias /home/securityhub/securityhub/securityhub/media/company/;
        expires 7d;
    }

    location /media/report/ {
        alias /home/securityhub/securityhub/securityhub/media/report/;
        expires 1d;
    }

    # ── Frontend SPA ─────────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html =404;

        # Cache built assets (Vite fingerprints them) but not index.html
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    access_log /var/log/nginx/securityhub_access.log;
    error_log  /var/log/nginx/securityhub_error.log;
}
