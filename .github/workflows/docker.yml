name: Docker Build and Test

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - 'securityhub/**'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - 'securityhub/**'

permissions:
  contents: read

jobs:
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile_API
          push: false
          tags: securityhub-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile_frontend
          push: false
          tags: securityhub-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-test:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    needs: docker-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          cp env.docker .env || echo "env.docker not found, using defaults"
          # Ensure required env vars are set
          echo "POSTGRES_USER=securityhub_user" >> .env
          echo "POSTGRES_PASSWORD=test_password" >> .env
          echo "POSTGRES_DB=securityhub" >> .env
          echo "REDIS_PASSWORD=test_redis_password" >> .env
          echo "SECRET_KEY=test-secret-key-for-ci-only" >> .env

      - name: Start services
        run: |
          docker compose up -d --wait

      - name: Wait for services to be healthy
        run: |
          timeout 60 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 2; done'

      - name: Run tests
        run: |
          docker compose exec -T securityhub python3 /home/securityhub/securityhub/securityhub/manage.py test --noinput || true

      - name: Check service health
        run: |
          docker compose ps

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v

