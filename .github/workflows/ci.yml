name: SecurityHub CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
      POSTGRES_HOST: localhost
      POSTGRES_DB: securityhub
      POSTGRES_PORT: 5432
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || 'test-redis-password' }}
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        env:
          REDIS_PASSWORD: ${{ env.REDIS_PASSWORD }}
        options: >-
          --health-cmd "redis-cli -a $REDIS_PASSWORD ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-cffi python3-brotli \
            libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0

      - name: Setup Poetry
        run: |
          python -m pip install --upgrade pip poetry==1.8.3

      - name: Install Python dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-root --no-interaction --no-ansi

      - name: Setup environment
        run: |
          mkdir -p securityhub
          echo "SECRET_KEY=${{ env.SECRET_KEY }}" > securityhub/.env
          echo 'WHITELIST_IP=["http://127.0.0.1:8080","http://127.0.0.1:8000"]' >> securityhub/.env
          echo 'ALLOWED_HOST=["127.0.0.1","localhost","*"]' >> securityhub/.env
          echo 'CORS_ALLOWED_ORIGINS=http://127.0.0.1:8080,http://127.0.0.1:5000' >> securityhub/.env
          echo "POSTGRES_USER=${{ env.POSTGRES_USER }}" >> securityhub/.env
          echo "POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}" >> securityhub/.env
          echo "POSTGRES_HOST=${{ env.POSTGRES_HOST }}" >> securityhub/.env
          echo "POSTGRES_DB=${{ env.POSTGRES_DB }}" >> securityhub/.env
          echo "POSTGRES_PORT=${{ env.POSTGRES_PORT }}" >> securityhub/.env
          echo 'USE_DOCKER=False' >> securityhub/.env
          echo 'USER_TIME_ZONE="UTC"' >> securityhub/.env
          echo "REDIS_URL=redis://:${{ env.REDIS_PASSWORD }}@localhost:6379/" >> securityhub/.env

      - name: Run migrations
        run: |
          poetry run python securityhub/manage.py makemigrations --noinput
          poetry run python securityhub/manage.py migrate --noinput

      - name: Run tests
        run: |
          poetry run python securityhub/manage.py test --noinput

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Create .env file
        run: |
          echo "VITE_APP_API_URL=/api/" > frontend/.env
          echo "VITE_APP_ENV=production" >> frontend/.env

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-node-${{ matrix.node-version }}
          path: frontend/dist
          retention-days: 7

